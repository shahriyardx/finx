plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.smslistener'
version = '0.1.0'

android {
  namespace "expo.modules.smslistener"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // Replaced with `com.facebook.react:react-android:$version` by the RN gradle
  // plugin. Needed for HeadlessJsTaskService used by the SMS headless import.
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"
}
